{% extends "base.html" %}

{% block title %}Dashboard - JEMS-Net{% endblock %}
{% block content %}

<!-- TOP CARDS -->
<div class="top">
  <div class="panel" id="net">Network Data<br><small>Loading...</small></div>
  <div class="panel" id="conn">Connections<br><small>Loading...</small></div>
  <div class="panel" id="ai">AI Insight<br><small>Loading...</small></div>
</div>

<!-- CENTER -->
<div class="center">

  <!-- GRAPH -->
  <div class="panel chart">
    <canvas id="chart"></canvas>
  </div>

  <!-- RADAR -->
  <div class="panel radar">
    <svg viewBox="0 0 300 300">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>
      <circle cx="150" cy="150" r="120" class="ring1"/>
      <circle cx="150" cy="150" r="90" class="ring2"/>
      <circle cx="150" cy="150" r="60" class="ring3"/>
      <line x1="150" y1="150" x2="260" y2="150" class="scan"/>
      <text x="150" y="160" text-anchor="middle" class="center-text">100%</text>
    </svg>
  </div>

</div>

{% endblock %}
